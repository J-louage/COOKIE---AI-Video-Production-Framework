# COOKIE Framework — Default Negative Prompts
# These negative prompts are injected into generation prompts to prevent common artifacts.
# Usage: Agents merge these with character-specific and scene-specific negative prompts.

universal:
  - "blurry"
  - "low quality"
  - "watermark"
  - "text overlay"
  - "distorted"
  - "extra limbs"
  - "disfigured"
  - "bad anatomy"
  - "poorly drawn"
  - "mutation"
  - "deformed"
  - "ugly"
  - "duplicate"
  - "morbid"
  - "out of frame"

character_specific:
  - "wrong eye color"
  - "wrong hair color"
  - "wrong clothing"
  - "inconsistent appearance"
  - "age mismatch"
  - "gender mismatch"
  - "wrong skin tone"

video_specific:
  - "flickering"
  - "temporal inconsistency"
  - "frame skipping"
  - "morphing artifacts"
  - "ghosting"
  - "unnatural movement"
  - "frozen pose"

text_overlay_specific:
  - "misspelled text"
  - "garbled letters"
  - "unreadable text"
  - "wrong font"
  - "text artifacts"
