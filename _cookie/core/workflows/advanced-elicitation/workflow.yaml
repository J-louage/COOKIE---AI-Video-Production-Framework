name: advanced-elicitation
workflow_id: advanced-elicitation
module: core
agent: director
slash_command: /core-advanced-elicitation
description: "Structured questioning for ambiguous or incomplete user requests"
priority: P1
config_source: "{project-root}/_cookie/core/config.yaml"
installed_path: "{project-root}/_cookie/core/workflows/advanced-elicitation"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"

required_skills:
  - "{project-root}/_cookie/skills/shared/prompt-engineering.md"

on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

quality_gates:
  post_complete:
    - check: "specification_is_complete == true"
    - check: "handoff_workflow_identified == true"
    - check: "all_essential_questions_answered == true"
