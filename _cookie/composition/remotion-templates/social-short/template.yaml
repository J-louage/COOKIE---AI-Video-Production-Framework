name: social-short
description: >
  Vertical short-form video template for TikTok, Instagram Reels, and YouTube
  Shorts. Features mandatory hook in the first 1.5 s, always-on captions,
  CTA at end, and an optional progress bar. Designed for high engagement and
  thumb-stopping content.

format: social-short
aspect_ratio: "9:16"

defaults:
  fps: 30
  width: 1080
  height: 1920
  min_duration_seconds: 15
  max_duration_seconds: 60

transitions:
  default: fade-in
  supported:
    - fade-in
    - fade-out
    - cross-dissolve
    - wipe-up
    - wipe-down
  default_duration_frames: 8

supported_overlays:
  - title-card
  - text-overlay
  - caption-tiktok
  - progress-bar
  - lower-third

hook_required: true
hook_duration: 1.5s
captions_always_on: true
cta_at_end: true
progress_bar: optional

text_density: high

scenes:
  min: 1
  max: 8
  structure:
    - type: hook
      required: true
      duration_seconds: 1.5
      suggested_overlay: text-overlay
      notes: >
        Must grab attention immediately. Bold text, fast cuts, or a provocative
        question. This is the single most critical part of the video.
    - type: body
      recommended_duration_seconds: 10-45
      suggested_overlay: caption-tiktok
    - type: cta
      required: true
      recommended_duration_seconds: 3-8
      suggested_overlay: text-overlay
      notes: >
        Call-to-action: follow, like, link in bio, swipe up, etc.
