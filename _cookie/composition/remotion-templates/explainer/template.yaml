name: explainer
description: >
  Explainer video template optimised for educational content, onboarding
  tutorials, and knowledge-sharing clips. Features high text density, fast
  pacing, and always-on subtitles to maximise information transfer and
  accessibility.

format: explainer
aspect_ratio: "16:9"

defaults:
  fps: 30
  width: 1920
  height: 1080
  min_duration_seconds: 60
  max_duration_seconds: 180

transitions:
  default: cross-dissolve
  supported:
    - cross-dissolve
    - fade-in
    - fade-out
    - fade-from-black
    - fade-to-black
    - wipe-left
    - wipe-right
    - wipe-up
    - wipe-down
  default_duration_frames: 12

supported_overlays:
  - lower-third
  - title-card
  - text-overlay
  - caption-tiktok
  - progress-bar

text_density: high
pacing: fast
subtitles_always_on: true

scenes:
  min: 3
  max: 20
  structure:
    - type: hook
      recommended_duration_seconds: 3-8
      suggested_overlay: title-card
    - type: problem
      recommended_duration_seconds: 10-30
      suggested_overlay: text-overlay
    - type: solution
      recommended_duration_seconds: 15-45
      suggested_overlay: text-overlay
    - type: steps
      recommended_duration_seconds: 10-40
      suggested_overlay: text-overlay
    - type: recap
      recommended_duration_seconds: 5-15
      suggested_overlay: title-card
