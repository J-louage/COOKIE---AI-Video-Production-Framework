# Instagram Square Encoding Preset
# 1:1 square format at 1080x1080 for Instagram feed posts.
# Square format has the largest visual footprint in the Instagram feed.
# Simple, reliable encoding — no file size concerns for typical durations.

preset_name: "instagram-square"
platform: "Instagram"
description: "Instagram square feed post — 1:1 aspect ratio at 1080x1080, universal feed format with maximum visual footprint"

resolution:
  width: 1080
  height: 1080

aspect_ratio: "1:1"
frame_rate: 30

codec_settings:
  video_codec: "libx264"
  pixel_format: "yuv420p"
  crf: 23
  preset: "medium"
  profile: "high"
  level: "4.0"

audio_settings:
  codec: "aac"
  bitrate: "128k"
  sample_rate: 44100
  channels: 2

constraints:
  max_bitrate: null
  bufsize: null
  max_file_size: null
  max_duration: 60         # 60 seconds maximum for feed video

ffmpeg_command: >-
  ffmpeg -i {input}
  -t 60
  -c:v libx264 -pix_fmt yuv420p -crf 23 -preset medium
  -profile:v high -level:v 4.0
  -vf "scale=1080:1080:force_original_aspect_ratio=decrease,pad=1080:1080:(ow-iw)/2:(oh-ih)/2"
  -c:a aac -b:a 128k -ar 44100 -ac 2
  -movflags +faststart
  {output}.mp4

# Crop from 16:9 source (center crop, no letterbox):
ffmpeg_command_crop: >-
  ffmpeg -i {input}
  -t 60
  -c:v libx264 -pix_fmt yuv420p -crf 23 -preset medium
  -profile:v high -level:v 4.0
  -vf "crop=ih:ih,scale=1080:1080"
  -c:a aac -b:a 128k -ar 44100 -ac 2
  -movflags +faststart
  {output}.mp4

# Notes:
# - Square (1:1) takes up the most screen real estate in the Instagram feed
# - crop=ih:ih crops a square from center of a 16:9 source (uses full height, crops width)
# - -t 60 enforces the 60-second feed video duration limit
# - No file size constraint needed — 60s at CRF 23 at 1080x1080 is well under 100MB
# - Audio at 44100 Hz matches Instagram's native sample rate
# - For carousel posts, each video can be up to 60 seconds
