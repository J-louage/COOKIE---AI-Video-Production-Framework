name: render-preview
workflow_id: render-preview
module: composition
agent: editor
slash_command: /composition-render-preview
description: "Render a low-resolution preview of the Remotion composition for review"
config_source: "{project-root}/_cookie/composition/config.yaml"
installed_path: "{project-root}/_cookie/composition/workflows/render-preview"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"

required_skills:
  - "{project-root}/_cookie/skills/remotion/SKILL.md"

on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

quality_gates:
  post_complete:
    - check: "render_config_set_low_res == true"
    - check: "preview_rendered_successfully == true"
    - check: "preview_presented_for_review == true"
    - check: "approval_gate_passed == true"
