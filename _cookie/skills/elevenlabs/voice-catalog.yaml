# ElevenLabs Voice Catalog
# ========================
# Pre-cataloged voices with recommended settings for common use cases.
# These are ElevenLabs stock voices available on all plans.
#
# To use a voice: reference the `id` field in your API calls or character identity.json.
# The `recommended_settings` are tested starting points — adjust per your content needs.
# See voice-config-guide.md for parameter tuning details.
#
# Voice availability may change. Verify with GET /v1/voices if a voice returns 404.
# Last verified: 2025-05-01

