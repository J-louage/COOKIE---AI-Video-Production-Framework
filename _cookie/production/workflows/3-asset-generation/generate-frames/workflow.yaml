name: generate-frames
workflow_id: generate-frames
module: production
agent: cinematographer
slash_command: /production-generate-frames
description: "Generate first/last frames for VEO clips via Nano Banana"
config_source: "{project-root}/_cookie/production/config.yaml"
installed_path: "{project-root}/_cookie/production/workflows/3-asset-generation/generate-frames"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"

required_skills:
  - "{project-root}/_cookie/skills/nano-banana/SKILL.md"
  - "{project-root}/_cookie/skills/image-editing/SKILL.md"

on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

quality_gates:
  post_complete:
    - check: "all_nano_banana_frames_generated == true"
    - check: "correct_resolution_and_aspect_ratio == true"
    - check: "files_at_expected_paths == true"

input_file_patterns:
  ssd:
    path: "{project-root}/episodes/{episode_id}/ssd/scene-spec.yaml"
    load_strategy: "FULL_LOAD"
  dependency_graph:
    path: "{project-root}/episodes/{episode_id}/planning/dependency-graph.yaml"
    load_strategy: "FULL_LOAD"
  prompt_library:
    path: "{project-root}/episodes/{episode_id}/prompts/prompt-library.yaml"
    load_strategy: "FULL_LOAD"
  characters:
    path: "{project-root}/characters/"
    load_strategy: "INDEX_GUIDED"
