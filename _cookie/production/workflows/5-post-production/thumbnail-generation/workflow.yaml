name: thumbnail-generation
workflow_id: thumbnail-generation
module: production
agent: editor
slash_command: /production-thumbnail-generation
description: "Generate platform-specific thumbnails from representative video frames with brand overlay"
config_source: "{project-root}/_cookie/production/config.yaml"
installed_path: "{project-root}/_cookie/production/workflows/5-post-production/thumbnail-generation"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"

required_skills:
  - "{project-root}/_cookie/skills/ffmpeg/SKILL.md"
  - "{project-root}/_cookie/skills/image-editing/SKILL.md"

input_file_patterns:
  rendered_video:
    path: "{project-root}/episodes/{episode_id}/exports/"
    load_strategy: "INDEX_GUIDED"
  ssd:
    path: "{project-root}/episodes/{episode_id}/ssd/scene-spec.yaml"
    load_strategy: "FULL_LOAD"

on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

quality_gates:
  post_complete:
    - check: "hook_scenes_identified == true"
    - check: "representative_frames_extracted == true"
    - check: "brand_overlay_applied == true"
    - check: "platform_sizes_generated == true"
    - check: "thumbnails_saved == true"
