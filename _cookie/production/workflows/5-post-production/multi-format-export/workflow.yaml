name: multi-format-export
workflow_id: multi-format-export
module: production
agent: editor
slash_command: /production-multi-format-export
description: "Export the final video in multiple formats and aspect ratios for different platforms"
config_source: "{project-root}/_cookie/production/config.yaml"
installed_path: "{project-root}/_cookie/production/workflows/5-post-production/multi-format-export"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"

required_skills:
  - "{project-root}/_cookie/skills/ffmpeg/SKILL.md"
  - "{project-root}/_cookie/skills/shared/aspect-ratio-guide.md"

input_file_patterns:
  rendered_video:
    path: "{project-root}/episodes/{episode_id}/exports/"
    load_strategy: "INDEX_GUIDED"
  format_presets:
    path: "{project-root}/_cookie/_config/format-presets.yaml"
    load_strategy: "FULL_LOAD"

on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

quality_gates:
  post_complete:
    - check: "format_list_loaded == true"
    - check: "all_formats_rendered == true"
    - check: "crop_and_scale_correct == true"
    - check: "captions_applied_where_needed == true"
    - check: "encoding_presets_applied == true"
