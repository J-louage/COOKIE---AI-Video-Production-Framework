name: final-render
workflow_id: final-render
module: production
agent: editor
slash_command: /production-final-render
description: "Render the final full-resolution video from the Remotion composition"
config_source: "{project-root}/_cookie/production/config.yaml"
installed_path: "{project-root}/_cookie/production/workflows/5-post-production/final-render"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"

required_skills:
  - "{project-root}/_cookie/skills/remotion/SKILL.md"
  - "{project-root}/_cookie/skills/ffmpeg/SKILL.md"

input_file_patterns:
  remotion_project:
    path: "{project-root}/episodes/{episode_id}/composition/"
    load_strategy: "INDEX_GUIDED"

on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

quality_gates:
  post_complete:
    - check: "resolution_profile_loaded == true"
    - check: "render_config_set_full_res == true"
    - check: "render_completed_successfully == true"
    - check: "output_verified == true"
    - check: "output_saved_to_exports == true"
