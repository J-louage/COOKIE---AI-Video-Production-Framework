name: video-extend-plan
workflow_id: video-extend-plan
module: production
agent: screenwriter
slash_command: /production-video-extend-plan
description: "Plan modifications for existing video content including extensions, replacements, overlays, format changes, and narration"
priority: P2
config_source: "{project-root}/_cookie/production/config.yaml"
installed_path: "{project-root}/_cookie/production/workflows/1-ideation/video-extend-plan"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"

required_skills:
  - "{project-root}/_cookie/skills/shared/prompt-engineering.md"
  - "{project-root}/_cookie/skills/veo/SKILL.md"
  - "{project-root}/_cookie/skills/ffmpeg/SKILL.md"

supported_modification_types:
  - extend_duration
  - replace_section
  - add_overlay
  - change_format
  - add_narration

on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

quality_gates:
  post_complete:
    - check: "modification_type_classified == true"
    - check: "modification_maintains_style_continuity == true"
    - check: "scenes_have_valid_ssd_entries == true"
    - check: "continuity_verified_at_boundaries == true"
    - check: "execution_strategy_defined == true"

input_file_patterns:
  existing_video:
    path: "{project-root}/episodes/{episode_id}/assets/video/"
    load_strategy: "INDEX_GUIDED"
  existing_ssd:
    path: "{project-root}/episodes/{episode_id}/ssd/scene-spec.yaml"
    load_strategy: "FULL_LOAD"
  characters:
    path: "{project-root}/characters/"
    load_strategy: "INDEX_GUIDED"
  environments:
    path: "{project-root}/characters/environments/"
    load_strategy: "INDEX_GUIDED"
