name: create-character-sheet
workflow_id: create-character-sheet
module: production
agent: character-designer
slash_command: /production-create-character-sheet
description: "Create character identity with prompt tokens and voice config"
production_state_flags:
  - "characters_created"
config_source: "{project-root}/_cookie/production/config.yaml"
installed_path: "{project-root}/_cookie/production/workflows/2-pre-production/create-character-sheet"
instructions: "{installed_path}/instructions.xml"
validation: "{installed_path}/checklist.md"

required_skills:
  - "{project-root}/_cookie/skills/nano-banana/SKILL.md"
  - "{project-root}/_cookie/skills/image-editing/SKILL.md"

on_error:
  missing_file: "ask_user"
  unresolved_variable: "halt"

quality_gates:
  post_complete:
    - check: "identity_json_validates_against_schema == true"
    - check: "all_required_fields_present == true"
    - check: "prompt_tokens_descriptive_enough == true"
    - check: "voice_config_complete == true"

input_file_patterns:
  character_schema:
    path: "{project-root}/_cookie/schemas/character-identity.schema.json"
    load_strategy: "FULL_LOAD"
  existing_characters:
    path: "{project-root}/characters/"
    load_strategy: "INDEX_GUIDED"
  defaults:
    path: "{project-root}/_cookie/_config/character-defaults.yaml"
    load_strategy: "FULL_LOAD"
